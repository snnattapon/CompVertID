name: Build executables

# สร้างไฟล์ .exe / .app อัตโนมัติเมื่อ push tag เวอร์ชัน (เช่น v0.1.0)
# หรือสั่งรันเองผ่านหน้า Actions (workflow_dispatch)
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# repo ยุคใหม่ default เป็น read-only — ต้องขอสิทธิ์เขียนเพื่อสร้าง release
permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false   # ถ้า OS หนึ่งพัง อีก OS ยัง build ต่อ
      matrix:
        include:
          - os: windows-latest
            label: Windows
            artifact_name: CompVertID-Windows
            binary_path: build/dist/CompVertID-Windows.exe
          - os: macos-15-intel    # Intel Mac (x86_64)
            label: macOS-Intel
            artifact_name: CompVertID-macOS-Intel
            binary_path: build/dist/CompVertID-macOS-Intel.zip
          - os: macos-latest      # Apple Silicon (arm64)
            label: macOS-AppleSilicon
            artifact_name: CompVertID-macOS-AppleSilicon
            binary_path: build/dist/CompVertID-macOS-AppleSilicon.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies + build tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"

      - name: Build executable (onefile)
        run: pyinstaller build/compvertid.spec --distpath build/dist --workpath build/tmp

      - name: Package artifact
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            # Windows: .exe เดี่ยว แค่เปลี่ยนชื่อ
            mv "build/dist/CompVertID.exe" "${{ matrix.binary_path }}"
          else
            # macOS: ห่อ .app แล้ว zip ด้วย ditto (รักษาโครงสร้าง + permission)
            ditto -c -k --keepParent \
              "build/dist/CompVertID.app" \
              "${{ matrix.binary_path }}"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.binary_path }}
          if-no-files-found: warn
          retention-days: 14

  # รวม binary ทุก OS แนบเข้ากับ GitHub Release (เฉพาะตอน push tag)
  release:
    name: Attach binaries to release
    needs: build
    runs-on: ubuntu-latest
    if: always() && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: CompVertID-*
          merge-multiple: true

      - name: List downloaded files
        run: find artifacts -type f

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/**/*
          generate_release_notes: true